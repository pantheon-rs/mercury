name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v17
      - name: Flake checks
        run: nix flake check --print-build-logs
      - name: Scripted CI
        run: ./scripts/ci.sh
