name: CI

on:
  push:
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v17
      # Flake checks cover: formatting, clippy (-D warnings), tests, docs,
      # package build, and building + running the examples — all on the
      # pinned nightly+Enzyme toolchain (nix/rust-toolchain.nix).
      - name: Flake checks
        run: nix flake check --print-build-logs
