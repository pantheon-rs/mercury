name: Docs

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v17
      - name: Build docs
        run: ./scripts/docs.sh
      - name: Add root redirect
        run: |
          cat > target/doc/index.html << 'HTML'
          <!DOCTYPE html>
          <meta http-equiv="refresh" content="0; url=mercury/index.html">
          <a href="mercury/index.html">mercury documentation</a>
          HTML
      - uses: actions/upload-pages-artifact@v3
        with:
          path: target/doc

  deploy:
    # Publish from main pushes, or manually (Actions tab -> Docs -> Run
    # workflow) from any branch.
    # phase1 is TEMPORARY until it merges to main — drop it after the merge.
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/phase1'))
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
