name: Security

on:
  push:
  pull_request:
  schedule:
    - cron: "0 10 * * 1"

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: DeterminateSystems/nix-installer-action@v17
      - uses: DeterminateSystems/magic-nix-cache-action@v9
      - name: Dependency and license audit
        run: ./scripts/audit.sh
